spring.application.name=uade-shop-api

# H2 Database (se reinicia al parar la app)
# Estas lineas quedan como referencia para desarrollo liviano,
# pero la configuracion activa de esta app apunta a MySQL/XAMPP.
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ============================================================
# Configuracion principal para correr la app en local con XAMPP
# ============================================================
# Esta configuracion asume MySQL corriendo en XAMPP sobre
# localhost:3306.
#
# IMPORTANTE:
# Cada usuario debe cambiar estos valores segun SU entorno:
# - spring.datasource.url
# - spring.datasource.username
# - spring.datasource.password
#
# Si tu base de datos tiene otro nombre, usuario, password,
# host o puerto, modificalo aca antes de ejecutar la app.
#
# Ejemplo comun con XAMPP:
# - host: localhost
# - port: 3306
# - usuario: root
# - password: vacio por defecto en muchas instalaciones

# 1. Configuracion de la Fuente de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db3?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# 2. Driver especifico para MySQL/MariaDB de XAMPP
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# Esta clave se usa para firmar y validar el token.
# En produccion conviene moverla a variables de entorno.
jwt.secret=miClaveSecretaDe32CaracteresParaJWT2025

# Tiempo de expiracion del token en milisegundos.
# Ejemplo: 24 horas = 86400000 ms
jwt.expiration=86400000
